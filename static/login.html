<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestAI — Login</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f1117;color:#e4e4e7;display:flex;align-items:center;justify-content:center;min-height:100vh}
        .login-card{background:#1a1c2e;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
        .logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px;color:#818cf8}
        .logo span{font-size:1.5rem;font-weight:700;color:#e4e4e7}
        h2{text-align:center;margin-bottom:8px;font-size:1.15rem;font-weight:500}
        .subtitle{text-align:center;color:#8b8fa3;font-size:.875rem;margin-bottom:28px}
        .form-group{margin-bottom:16px}
        label{display:block;font-size:.8rem;color:#8b8fa3;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
        input{width:100%;padding:12px 14px;background:#141622;border:1px solid rgba(255,255,255,.08);border-radius:8px;color:#e4e4e7;font-size:1rem;outline:none;transition:border-color .2s}
        input:focus{border-color:#818cf8}
        input::placeholder{color:#4a4d5e}
        .btn{width:100%;padding:12px;background:#818cf8;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
        .btn:hover{background:#6366f1}
        .btn:disabled{opacity:.5;cursor:not-allowed}
        .btn-secondary{background:transparent;border:1px solid #818cf8;color:#818cf8}
        .btn-secondary:hover{background:rgba(129,140,248,.1)}
        .error{color:#ef4444;font-size:.85rem;text-align:center;margin-top:16px;min-height:20px}
        .success{color:#22c55e;font-size:.85rem;text-align:center;margin-top:16px;min-height:20px}
        .footer{text-align:center;color:#4a4d5e;font-size:.75rem;margin-top:28px}
        .lock-icon{width:48px;height:48px;margin:0 auto 20px;background:rgba(129,140,248,.1);border-radius:50%;display:flex;align-items:center;justify-content:center}
        .tab-bar{display:flex;gap:0;margin-bottom:24px;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.08)}
        .tab-btn{flex:1;padding:10px;background:transparent;color:#8b8fa3;border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
        .tab-btn.active{background:#818cf8;color:#fff}
        .hidden{display:none}
        .forgot-link{color:#818cf8;font-size:.85rem;text-align:right;display:block;margin-top:4px;cursor:pointer;text-decoration:none}
        .forgot-link:hover{text-decoration:underline}
        .back-link{color:#8b8fa3;font-size:.85rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:4px;margin-bottom:16px}
        .back-link:hover{color:#e4e4e7}
        .code-input{letter-spacing:.5em;text-align:center;font-size:1.3rem;font-family:monospace}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="lock-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#818cf8" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </div>
        <div class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            <span>InvestAI</span>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" onclick="showTab('login')">Sign In</button>
            <button class="tab-btn" onclick="showTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label for="login-email">Email</label>
                <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" autofocus required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn" id="login-btn">Sign In</button>
            <a class="forgot-link" onclick="showForgotPassword()">Forgot password?</a>
            <div class="error" id="login-error"></div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="hidden" onsubmit="doRegister(event)">
            <div class="form-group">
                <label for="reg-name">Name</label>
                <input type="text" id="reg-name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="form-group">
                <label for="reg-email">Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="Choose a password (min 4 chars)" autocomplete="new-password" required minlength="4">
            </div>
            <button type="submit" class="btn" id="reg-btn">Create Account</button>
            <div class="error" id="reg-error"></div>
            <div class="success" id="reg-success"></div>
        </form>

        <div class="footer">Your data is private — each account has its own portfolio, watchlist &amp; settings.</div>

        <!-- Forgot Password: Step 1 - Enter Email -->
        <form id="forgot-form" class="hidden" onsubmit="doForgot(event)">
            <a class="back-link" onclick="showLoginFromForgot()">&#8592; Back to Sign In</a>
            <h2 style="margin-bottom:8px">Reset Password</h2>
            <p class="subtitle">Enter your email and we'll send you a reset code.</p>
            <div class="form-group">
                <label for="forgot-email">Email</label>
                <input type="email" id="forgot-email" placeholder="you@example.com" required>
            </div>
            <button type="submit" class="btn" id="forgot-btn">Send Reset Code</button>
            <div class="error" id="forgot-error"></div>
            <div class="success" id="forgot-success"></div>
        </form>

        <!-- Forgot Password: Step 2 - Enter Code + New Password -->
        <form id="reset-form" class="hidden" onsubmit="doReset(event)">
            <a class="back-link" onclick="showForgotPassword()">&#8592; Back</a>
            <h2 style="margin-bottom:8px">Enter Reset Code</h2>
            <p class="subtitle">Check your email for the 6-digit code.</p>
            <div class="form-group">
                <label for="reset-code">Reset Code</label>
                <input type="text" id="reset-code" class="code-input" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
            </div>
            <div class="form-group">
                <label for="reset-password">New Password</label>
                <input type="password" id="reset-password" placeholder="Min 4 characters" minlength="4" required>
            </div>
            <button type="submit" class="btn" id="reset-btn">Reset Password</button>
            <div class="error" id="reset-error"></div>
            <div class="success" id="reset-success"></div>
        </form>
    </div>
    <script>
        // ── Tab switching ────────────────────────────
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.querySelector('.tab-bar').classList.remove('hidden');
            document.querySelector('.footer').classList.remove('hidden');
            if (tab === 'login') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('login-form').classList.remove('hidden');
                document.getElementById('register-form').classList.add('hidden');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('login-form').classList.add('hidden');
                document.getElementById('register-form').classList.remove('hidden');
            }
        }

        // ── Show / hide forgot password ──────────────
        let _forgotEmail = "";

        function showForgotPassword() {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('register-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.querySelector('.tab-bar').classList.add('hidden');
            document.querySelector('.footer').classList.add('hidden');
            document.getElementById('forgot-form').classList.remove('hidden');
            document.getElementById('forgot-error').textContent = "";
            document.getElementById('forgot-success').textContent = "";
        }

        function showLoginFromForgot() {
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            showTab('login');
        }

        function showResetForm() {
            document.getElementById('forgot-form').classList.add('hidden');
            document.getElementById('reset-form').classList.remove('hidden');
            document.getElementById('reset-error').textContent = "";
            document.getElementById('reset-success').textContent = "";
        }

        // ── Login ────────────────────────────────────
        async function doLogin(e) {
            e.preventDefault();
            const email = document.getElementById("login-email").value.trim();
            const password = document.getElementById("login-password").value;
            const btn = document.getElementById("login-btn");
            const err = document.getElementById("login-error");
            if (!email || !password) return;

            btn.disabled = true;
            btn.textContent = "Signing in...";
            err.textContent = "";

            try {
                const res = await fetch("/auth/login", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password}),
                });
                if (res.ok) {
                    window.location.href = "/";
                } else {
                    const data = await res.json();
                    err.textContent = data.detail || "Invalid email or password";
                    btn.disabled = false;
                    btn.textContent = "Sign In";
                }
            } catch (ex) {
                err.textContent = "Connection error. Try again.";
                btn.disabled = false;
                btn.textContent = "Sign In";
            }
        }

        // ── Register ─────────────────────────────────
        async function doRegister(e) {
            e.preventDefault();
            const name = document.getElementById("reg-name").value.trim();
            const email = document.getElementById("reg-email").value.trim();
            const password = document.getElementById("reg-password").value;
            const btn = document.getElementById("reg-btn");
            const err = document.getElementById("reg-error");
            const suc = document.getElementById("reg-success");
            if (!email || !password) return;

            btn.disabled = true;
            btn.textContent = "Creating account...";
            err.textContent = "";
            suc.textContent = "";

            try {
                const res = await fetch("/auth/register", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email, password, name}),
                });
                if (res.ok) {
                    window.location.href = "/";
                } else {
                    const data = await res.json();
                    err.textContent = data.detail || "Registration failed";
                    btn.disabled = false;
                    btn.textContent = "Create Account";
                }
            } catch (ex) {
                err.textContent = "Connection error. Try again.";
                btn.disabled = false;
                btn.textContent = "Create Account";
            }
        }

        // ── Forgot Password ─────────────────────────
        async function doForgot(e) {
            e.preventDefault();
            const email = document.getElementById("forgot-email").value.trim();
            const btn = document.getElementById("forgot-btn");
            const err = document.getElementById("forgot-error");
            const suc = document.getElementById("forgot-success");
            if (!email) return;

            btn.disabled = true;
            btn.textContent = "Sending...";
            err.textContent = "";
            suc.textContent = "";

            try {
                const res = await fetch("/auth/forgot-password", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email}),
                });
                const data = await res.json();
                if (res.ok) {
                    _forgotEmail = email;
                    if (data.code) {
                        // No email service — code returned directly
                        document.getElementById("reset-code").value = data.code;
                        suc.textContent = "Your reset code: " + data.code;
                    } else {
                        suc.textContent = data.message || "Reset code sent!";
                    }
                    setTimeout(() => showResetForm(), 1200);
                } else {
                    err.textContent = data.detail || "Something went wrong";
                }
            } catch (ex) {
                err.textContent = "Connection error. Try again.";
            } finally {
                btn.disabled = false;
                btn.textContent = "Send Reset Code";
            }
        }

        // ── Reset Password ──────────────────────────
        async function doReset(e) {
            e.preventDefault();
            const code = document.getElementById("reset-code").value.trim();
            const newPassword = document.getElementById("reset-password").value;
            const btn = document.getElementById("reset-btn");
            const err = document.getElementById("reset-error");
            const suc = document.getElementById("reset-success");
            if (!code || !newPassword) return;

            btn.disabled = true;
            btn.textContent = "Resetting...";
            err.textContent = "";
            suc.textContent = "";

            try {
                const res = await fetch("/auth/reset-password", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({email: _forgotEmail, code, new_password: newPassword}),
                });
                const data = await res.json();
                if (res.ok) {
                    suc.textContent = data.message || "Password reset! Redirecting...";
                    setTimeout(() => showLoginFromForgot(), 2000);
                } else {
                    err.textContent = data.detail || "Reset failed";
                    btn.disabled = false;
                    btn.textContent = "Reset Password";
                }
            } catch (ex) {
                err.textContent = "Connection error. Try again.";
                btn.disabled = false;
                btn.textContent = "Reset Password";
            }
        }
    </script>
</body>
</html>
