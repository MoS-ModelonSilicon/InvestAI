# ──────────────────────────────────────────────────────────────
# Pre-commit hooks – run automatically before each git commit
# Install once:  pre-commit install
# Run manually:  pre-commit run --all-files
# ──────────────────────────────────────────────────────────────
repos:
  # ── Ruff: lint + format (replaces flake8, isort, black) ────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff                    # lint check
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format             # format check

  # ── Mypy: type checking ────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi>=0.135.0
          - pydantic>=2.12.0
          - sqlalchemy>=2.0.0
          - types-requests
        args: [--config-file=pyproject.toml]
        pass_filenames: false        # run on whole project

  # ── General file hygiene ────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: parabolic-craft     # service account JSON in root
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: debug-statements         # no pdb/breakpoint left in code
      - id: check-merge-conflict
