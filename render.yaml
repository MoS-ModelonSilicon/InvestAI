services:
  - type: web
    name: finance-tracker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DISABLE_YAHOO
        value: "1"
      - key: LOW_MEMORY
        value: "1"
      - key: ADMIN_EMAIL
        sync: false   # set in Render dashboard
      - key: ADMIN_PASSWORD
        sync: false   # set in Render dashboard
