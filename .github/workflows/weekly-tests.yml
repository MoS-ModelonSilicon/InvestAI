# ──────────────────────────────────────────────────────────────
# InvestAI Weekly Full Regression Tests
#
# Runs every Sunday at 4 AM UTC against the live Render site.
# Executes ALL live-site tests (smoke + deep) — the comprehensive suite.
# On failure: creates a GitHub Issue with full details.
# Can also be triggered manually from the Actions tab.
# ──────────────────────────────────────────────────────────────
name: Weekly Full Tests

on:
  schedule:
    - cron: '0 4 * * 0'          # 4 AM UTC every Sunday
  workflow_dispatch:              # manual trigger from Actions tab
    inputs:
      test_suite:
        description: 'Which test suite to run'
        required: false
        default: 'live-site'
        type: choice
        options:
          - live-site
          - deep-only
          - all

permissions:
  contents: write
  issues: write

env:
  LIVE_URL: https://investai-utho.onrender.com
  PYTHON_VERSION: '3.12'

jobs:
  # ── Step 1: Wake the Render site (free tier goes to sleep) ──
  wake-site:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site to wake it
        run: |
          echo "Waking up ${{ env.LIVE_URL }}..."
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.LIVE_URL }}/login" --max-time 60) || true
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Site is awake!"
              exit 0
            fi
            sleep 30
          done
          echo "::warning::Site may still be waking up, proceeding anyway"

  # ── Step 2: Run the full browser test suite ────────────────
  test:
    needs: wake-site
    runs-on: ubuntu-latest
    timeout-minutes: 90           # longer timeout for full suite
    outputs:
      test_passed: ${{ steps.run-tests.outcome == 'success' }}
      failed_tests: ${{ steps.parse-failures.outputs.failed_tests }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-html pytest-json-report pytest-timeout pytest-playwright
          playwright install chromium --with-deps

      - name: Warm up site before tests
        run: |
          echo "Warming up site for test runner..."
          for i in 1 2 3 4 5; do
            curl -s -o /dev/null -w "  Attempt $i: HTTP %{http_code} (%{time_total}s)\n" \
              "${{ env.LIVE_URL }}/login" --max-time 60 || true
            curl -s -o /dev/null -w "  Dashboard: HTTP %{http_code} (%{time_total}s)\n" \
              "${{ env.LIVE_URL }}/api/dashboard/summary" --max-time 60 || true
            sleep 5
          done

      - name: Run test suite
        id: run-tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          SUITE="${{ github.event.inputs.test_suite || 'live-site' }}"
          COMMON_ARGS="--live-url ${{ env.LIVE_URL }} --junitxml=results/junit.xml --html=results/report.html --self-contained-html --json-report --json-report-file=results/report.json -v --tb=long --timeout=300 --timeout-method=thread --maxfail=25"

          mkdir -p results

          case "$SUITE" in
            deep-only)
              python -m pytest tests/test_live_site.py -m deep $COMMON_ARGS 2>&1 | tee results/output.log
              ;;
            live-site)
              python -m pytest tests/test_live_site.py $COMMON_ARGS 2>&1 | tee results/output.log
              ;;
            *)
              python -m pytest tests/ $COMMON_ARGS 2>&1 | tee results/output.log
              ;;
          esac
        env:
          CI: true

      - name: Parse test failures
        id: parse-failures
        if: steps.run-tests.outcome == 'failure'
        run: |
          python -c "
          import xml.etree.ElementTree as ET, json
          tree = ET.parse('results/junit.xml')
          failures = []
          for tc in tree.iter('testcase'):
              fail = tc.find('failure') or tc.find('error')
              if fail is not None:
                  failures.append({
                      'class': tc.get('classname', ''),
                      'name': tc.get('name', ''),
                      'message': (fail.get('message', '') or '')[:500],
                  })
          print(f'Found {len(failures)} failure(s)')
          with open('results/failures.json', 'w') as f:
              json.dump(failures, f, indent=2)
          summary = ', '.join(f['name'] for f in failures[:10])
          with open('$GITHUB_OUTPUT', 'a') as gh:
              gh.write(f'failed_tests={summary}\n')
              gh.write(f'failure_count={len(failures)}\n')
          " 2>&1 || echo "Failed to parse JUnit XML"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-results-${{ github.run_number }}
          path: results/
          retention-days: 60

      - name: Set final status
        if: steps.run-tests.outcome == 'failure'
        run: exit 1

  # ── Step 3: On failure → create Issue with details ─────────
  notify-failure:
    needs: test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: weekly-results-${{ github.run_number }}
          path: results/

      - name: Create or update GitHub Issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let failures = [];
            try {
              failures = JSON.parse(fs.readFileSync('results/failures.json', 'utf8'));
            } catch (e) {
              failures = [{name: 'unknown', message: 'Could not parse failure report'}];
            }

            let logTail = '';
            try {
              const log = fs.readFileSync('results/output.log', 'utf8');
              const lines = log.split('\n');
              logTail = lines.slice(-100).join('\n');
            } catch (e) {
              logTail = 'Could not read test log';
            }

            const failList = failures.map(f =>
              `- **${f.class}::${f.name}**\n  \`${f.message}\``
            ).join('\n');

            const body = `## 🔴 Weekly Full Regression Failed

            **Run:** [#${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
            **Date:** ${new Date().toISOString().split('T')[0]}
            **Failed:** ${failures.length} test(s)

            ### Failed Tests
            ${failList}

            ### Log (last 100 lines)
            <details>
            <summary>Click to expand</summary>

            \`\`\`
            ${logTail}
            \`\`\`
            </details>

            ### Artifacts
            Download the full HTML report from the [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).

            ---
            *Auto-generated by weekly regression pipeline*
            `.replace(/^            /gm, '');

            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'weekly-failure',
              state: 'open',
              per_page: 1,
            });

            if (issues.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues[0].number,
                body: body,
              });
              console.log(`Updated issue #${issues[0].number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `🔴 Weekly tests failed (${failures.length} failure${failures.length > 1 ? 's' : ''})`,
                body: body,
                labels: ['weekly-failure', 'bug'],
              });
              console.log('Created new failure issue');
            }

  # ── Step 4: On success → close any open failure issues ─────
  close-on-success:
    needs: test
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Close resolved failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'weekly-failure',
              state: 'open',
            });
            for (const issue of issues) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `## ✅ All weekly tests passing now!\n\nClosed automatically by [run #${context.runNumber}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              console.log(`Closed issue #${issue.number}`);
            }
