# ──────────────────────────────────────────────────────────────
# InvestAI CI Gate — Smoke Tests + Lint
#
# Runs on every push to master (if src/static/tests changed).
# Smoke tests are REQUIRED — if they fail, staging won't deploy.
# Flow: push → smoke tests → staging auto-deploys → nightly E2E → promote to prod
# ──────────────────────────────────────────────────────────────
name: CI Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:             # manual trigger

permissions:
  contents: read
  checks: write
  deployments: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Fast API smoke tests (REQUIRED — blocks deploy) ────────
  smoke-tests:
    name: "Smoke Tests (API)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # NO continue-on-error — this is a blocking gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: |
          python -m pytest tests/test_api_smoke.py \
            -m "smoke and not external" \
            -v --tb=short \
            --junitxml=results/junit-smoke.xml \
            --timeout=30 \
            2>&1
        env:
          CI: true
          TESTING: "1"
          FINNHUB_API_KEY: ""
          INVESTAI_SECRET: "ci-test-secret"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_number }}
          path: results/
          retention-days: 7

  # ── Python lint / import check ─────────────────────────────
  lint:
    name: "Ruff Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: |
          ruff format --diff src/ tests/ || true
          ruff format --check src/ tests/

      - name: Verify app imports
        run: python -c "from src.main import app; print('App imports OK')"
        env:
          FINNHUB_API_KEY: ""
          INVESTAI_SECRET: "ci-test-secret"

  # ── Type checking with mypy (advisory, non-blocking) ────────
  type-check:
    name: "Mypy Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy src/ --config-file=pyproject.toml

  # ── Confirm staging deploy (auto-deploys on push to master) ──
  deploy-staging:
    name: "Staging Auto-Deploy"
    needs: [smoke-tests, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 2

    steps:
      - name: Confirm staging deploy
        run: |
          echo "CI passed — staging will auto-deploy via Render."
          echo ""
          echo "Pipeline:"
          echo "  1. Staging auto-deploys on push to master"
          echo "  2. Nightly E2E tests verify staging"
          echo "  3. On success: production promote via deploy hook"
          echo "  4. Manual promote: Actions > Promote to Production"
          echo ""
          echo "Staging:    https://finance-tracker-staging.onrender.com"
          echo "Production: https://investai-utho.onrender.com"
