# ──────────────────────────────────────────────────────────────
# InvestAI Commit Gate — Smoke Tests + Lint + Deploy
#
# Runs on every push to master (if src/static/tests changed).
# Smoke tests are REQUIRED — if they fail, deploy is skipped.
# Flow: push → smoke tests → if pass → Render deploy hook
# ──────────────────────────────────────────────────────────────
name: CI Gate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:             # manual trigger

permissions:
  contents: read
  checks: write
  deployments: write

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ── Fast API smoke tests (REQUIRED — blocks deploy) ────────
  smoke-tests:
    name: "Smoke Tests (API)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # NO continue-on-error — this is a blocking gate

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run smoke tests
        run: |
          python -m pytest tests/test_api_smoke.py \
            -m "smoke and not external" \
            -v --tb=short \
            --junitxml=results/junit-smoke.xml \
            --timeout=30 \
            2>&1
        env:
          CI: true
          TESTING: "1"
          FINNHUB_API_KEY: ""
          INVESTAI_SECRET: "ci-test-secret"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-results-${{ github.run_number }}
          path: results/
          retention-days: 7

  # ── Python lint / import check ─────────────────────────────
  lint:
    name: "Ruff Lint & Format Check"
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check src/ tests/ --output-format=github

      - name: Ruff format check
        run: ruff format --check src/ tests/

      - name: Verify app imports
        run: python -c "from src.main import app; print('App imports OK')"
        env:
          FINNHUB_API_KEY: ""
          INVESTAI_SECRET: "ci-test-secret"

  # ── Type checking with mypy (advisory, non-blocking) ────────
  type-check:
    name: "Mypy Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run mypy
        run: mypy src/ --config-file=pyproject.toml

  # ── Deploy to Render (only if smoke tests pass) ─────────────
  deploy:
    name: "Deploy to Render"
    needs: [smoke-tests, lint]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 5

    steps:
      - name: Trigger Render deploy
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "⚠️ RENDER_DEPLOY_HOOK secret not set — skipping deploy trigger."
            echo "Render auto-deploys on push. Set RENDER_DEPLOY_HOOK to gate deploys on CI."
            echo ""
            echo "To enable gated deploys:"
            echo "1. In Render dashboard → Settings → disable 'Auto-Deploy'"
            echo "2. Copy the Deploy Hook URL from Render → Settings"
            echo "3. Add it as GitHub secret: RENDER_DEPLOY_HOOK"
            exit 0
          fi
          echo "🚀 Smoke tests passed! Triggering Render deploy..."
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -o /dev/null -w "HTTP %{http_code}"
          echo ""
          echo "✅ Deploy triggered. Check https://dashboard.render.com for status."
